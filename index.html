<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pekan Arabi 2026 — Universitas Negeri Malang</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Marcellus&family=Cairo:wght@300;400;500;600;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --ink-950: #050211;
      --ink-900: #0e0624;
      --royal-700: #2c125c;
      --violet-500: #642ec7;
      --lilac-400: #aa80ff;
      --gold-300: #fff0c2;
      --gold-400: #ffcc66;
      --gold-500: #d49a17;
      --gold-700: #7a500b;
      --paper: #fefbfa;
      --glass-border: rgba(255, 255, 255, 0.12);
      --glass-bg: rgba(14, 6, 36, 0.82);
      --card-fill: linear-gradient(155deg, rgba(255, 255, 255, 0.04) 0%, rgba(106, 47, 201, 0.1) 60%, rgba(255, 255, 255, 0.01) 100%);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: 'Cairo', sans-serif;
      color: var(--paper);
      overflow-x: hidden;
      background: var(--ink-950);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* === LATAR BELAKANG: POSTER PEKAN ARABI ANIMASI BERGERAK (LANGIT MALAM) === */
    .anime-bg {
      position: fixed;
      inset: -30px;
      z-index: -13;
      background: linear-gradient(120deg, #1a0b3d, #3a1470, #611fa8, #2c125c, #0e0624);
      background-size: 400% 400%;
      animation: purpleFlow 18s ease-in-out infinite;
    }

    @keyframes purpleFlow {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Poster resmi Pekan Arabi sebagai latar, bernapas pelan (zoom in-out) */
    .poster-bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: -12;
      object-fit: cover;
      object-position: center;
      filter: brightness(0.55) saturate(1.15);
      transform-origin: center center;
      animation: breathe 28s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1.02); }
      50%      { transform: scale(1.07); }
    }

    /* Wadah elemen langit (bulan, bintang, kilau emas) yang bergerak lembut mengikuti kursor */
    .parallax {
      position: fixed;
      inset: -2%;
      z-index: -11;
      pointer-events: none;
      transition: transform .5s ease-out;
      will-change: transform;
    }

    .moon-glow {
      position: absolute;
      left: 76%; top: 11%;
      width: clamp(120px, 18vw, 260px);
      height: clamp(120px, 18vw, 260px);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,240,200,.55) 0%, rgba(255,210,130,.22) 45%, rgba(255,210,130,0) 75%);
      mix-blend-mode: screen;
      transform: translate(-50%,-50%) scale(1);
      animation: moonPulse 6.5s ease-in-out infinite;
    }
    @keyframes moonPulse {
      0%, 100% { opacity: .55; transform: translate(-50%,-50%) scale(1); }
      50%      { opacity: .95; transform: translate(-50%,-50%) scale(1.16); }
    }

    .wisp {
      position: absolute;
      width: clamp(80px, 11vw, 160px);
      height: clamp(80px, 11vw, 160px);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,230,180,.9) 0%, rgba(255,196,110,.45) 38%, rgba(255,196,110,0) 76%);
      filter: blur(3px);
      mix-blend-mode: screen;
      transform: translate(-50%,-50%) scale(.85);
      opacity: .3;
      animation-name: wispDrift;
      animation-timing-function: ease-in-out;
      animation-iteration-count: infinite;
    }
    @keyframes wispDrift {
      0%   { transform: translate(-50%,-50%) scale(.85); opacity: .28; }
      45%  { transform: translate(calc(-50% + var(--dx,8px)), calc(-50% + var(--dy,-16px))) scale(1.15); opacity: .72; }
      100% { transform: translate(-50%,-50%) scale(.85); opacity: .3; }
    }

    .star {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 6px 1px rgba(255,255,255,.85);
      opacity: .2;
      animation-name: twinkle;
      animation-timing-function: ease-in-out;
      animation-iteration-count: infinite;
    }
    .star.cyan { background: #8fedff; box-shadow: 0 0 6px 1px rgba(143,237,255,.85); }
    .star.gold { background: #ffe2a8; box-shadow: 0 0 6px 1px rgba(255,226,168,.85); }
    @keyframes twinkle {
      0%, 100% { opacity: .12; transform: scale(.7); }
      50%      { opacity: 1;   transform: scale(1.3); }
    }

    .dust {
      position: fixed;
      bottom: -2%;
      z-index: -10;
      border-radius: 50%;
      background: #ffdca0;
      box-shadow: 0 0 6px 2px rgba(255,220,160,.75);
      opacity: 0;
      pointer-events: none;
      animation-name: floatUp;
      animation-timing-function: ease-in;
      animation-iteration-count: infinite;
    }
    @keyframes floatUp {
      0%   { transform: translate(0,0); opacity: 0; }
      12%  { opacity: .8; }
      88%  { opacity: .35; }
      100% { transform: translate(var(--drift,20px), -108vh); opacity: 0; }
    }

    .bg-overlay {
      position: fixed;
      inset: 0;
      z-index: -9;
      background: linear-gradient(135deg, rgba(20, 6, 48, 0.45) 0%, rgba(14, 6, 36, 0.85) 100%);
      pointer-events: none;
    }

    @media (prefers-reduced-motion: reduce) {
      .anime-bg, .poster-bg, .parallax, .moon-glow, .wisp, .star, .dust { animation: none !important; transition: none !important; }
    }

    #sparkles {
      position: fixed;
      inset: 0;
      z-index: -5;
      pointer-events: none;
      overflow: hidden;
    }

    .spark {
      position: absolute;
      background: radial-gradient(circle, #fff 20%, transparent 80%);
      border-radius: 50%;
      opacity: 0;
      will-change: transform, opacity;
      animation: floatSparkle linear infinite;
    }

    @keyframes floatSparkle {
      0% { transform: translateY(105vh) translateX(0) scale(0); opacity: 0; }
      15% { opacity: 0.75; }
      85% { opacity: 0.4; }
      100% { transform: translateY(-5vh) translateX(30px) scale(1); opacity: 0; }
    }

    /* === SCREEN TRANSITION MANAGEMENT === */
    .screen {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2.5rem 1.25rem;
      position: absolute;
      width: 100%;
      top: 0;
      left: 0;
      transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1), opacity 1s ease;
      z-index: 20;
    }

    #splash-screen {
      opacity: 1;
      transform: translateY(0);
    }

    body.content-active #splash-screen {
      opacity: 0;
      transform: translateY(-100vh);
      pointer-events: none;
    }

    #content-screen {
      opacity: 0;
      transform: translateY(100vh);
      pointer-events: none;
      z-index: 10;
    }

    body.content-active #content-screen {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
      position: relative;
    }

    /* === CARD LAYOUT === */
    .glass-card {
      width: 100%;
      max-width: 480px;
      background: var(--glass-bg);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid var(--glass-border);
      border-radius: 32px;
      padding: 2.5rem 1.75rem;
      text-align: center;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.65), 
                  inset 0 1px 3px rgba(255, 255, 255, 0.15);
      position: relative;
    }

    #splash-screen .glass-card {
      animation: cardEntrance 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes cardEntrance {
      0% { opacity: 0; transform: translateY(30px) scale(0.97); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* === DESAIN LOGO GRUP AKBAR RESMI === */
    .logo-wrapper {
      position: relative;
      width: 145px;
      height: 145px;
      margin: 0 auto 2rem;
    }

    .logo-glow {
      position: absolute;
      inset: -6px;
      background: linear-gradient(45deg, var(--gold-500), var(--violet-500), var(--gold-400), var(--lilac-400));
      border-radius: 50%;
      filter: blur(16px);
      opacity: 0.85;
      animation: logoPulse 4s ease-in-out infinite alternate;
    }

    .logo-container {
      position: relative;
      width: 100%;
      height: 100%;
      background: #0e0624;
      border: 3px solid var(--gold-400);
      border-radius: 50%;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 0 30px rgba(255, 204, 102, 0.4);
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.4s ease;
    }

    .logo-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .logo-wrapper:hover .logo-container {
      transform: scale(1.06) rotate(3deg);
      border-color: #ffffff;
      box-shadow: 0 0 40px rgba(255, 204, 102, 0.65);
    }

    @keyframes logoPulse {
      0% { transform: scale(0.96); opacity: 0.65; filter: blur(12px); }
      100% { transform: scale(1.05); opacity: 0.95; filter: blur(18px); }
    }

    /* === ELEMEN TEKS === */
    h1 {
      font-family: 'Cinzel Decorative', serif;
      font-size: 2.2rem;
      font-weight: 700;
      color: #ffffff;
      text-shadow: 0 3px 12px rgba(0,0,0,0.6);
      margin-bottom: 0.5rem;
    }

    .sub-title {
      font-family: 'Marcellus', serif;
      font-size: 1rem;
      letter-spacing: 5px;
      color: var(--gold-400);
      text-transform: uppercase;
      margin-bottom: 2rem;
    }

    /* === TOMBOL PEMBUKA / TAP HERE === */
    .tap-here-btn {
      position: relative;
      background: transparent;
      border: 2px solid var(--gold-400);
      padding: 0.9rem 2.2rem;
      font-family: 'Cairo', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--gold-300);
      letter-spacing: 4px;
      text-transform: uppercase;
      border-radius: 50px;
      cursor: pointer;
      overflow: hidden;
      margin-top: 1rem;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 0 15px rgba(255, 212, 121, 0.15);
      animation: buttonPulse 2s infinite alternate;
    }

    @keyframes buttonPulse {
      0% { box-shadow: 0 0 10px rgba(255, 212, 121, 0.2); transform: scale(1); }
      100% { box-shadow: 0 0 25px rgba(255, 212, 121, 0.5); transform: scale(1.03); border-color: #fff; }
    }

    .tap-here-btn:hover {
      background: var(--gold-400);
      color: #1a0f00;
      box-shadow: 0 0 30px rgba(255, 212, 121, 0.7);
    }

    /* === INTERAKTIF CANVAS TYPING === */
    .typing-container {
      min-height: 64px;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 4px;
    }

    .typing-text {
      font-size: 1.05rem;
      line-height: 1.5;
      font-family: 'Amiri', serif;
      color: var(--gold-300);
      border-right: 2px solid var(--gold-400);
      padding-right: 6px;
      white-space: normal;
      overflow-wrap: break-word;
      word-break: break-word;
      display: inline;
      animation: blinkCursor 0.8s step-end infinite;
    }

    @keyframes blinkCursor {
      from, to { border-color: transparent }
      50% { border-color: var(--gold-400); }
    }

    /* === UKURAN TOMBOL YANG PAS & MENARIK (TIDAK KEBESARAN/KEKECILAN) === */
    .menu-links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 1.75rem;
      width: 100%;
    }

    .menu-item {
      position: relative;
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 0.85rem 1.15rem; /* Ukuran proporsional yang pas */
      border-radius: 14px;
      text-decoration: none;
      color: var(--paper);
      background: var(--card-fill);
      border: 1px solid var(--glass-border);
      box-shadow: 0 6px 20px rgba(8,3,26,0.35), inset 0 1px 0 rgba(255,255,255,0.08);
      overflow: hidden;
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .menu-item::after {
      content: "";
      position: absolute;
      top: 0; left: -60%;
      width: 30%; height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.12), transparent);
      transform: skewX(-20deg);
      transition: left 0.6s ease;
    }

    .menu-item:hover::after { left: 130%; }

    .menu-item:hover {
      transform: translateX(4px) translateY(-1px);
      border-color: var(--gold-400);
      box-shadow: 0 10px 24px rgba(8,3,26,0.45), 0 0 12px rgba(255, 212, 121, 0.2);
    }

    .icon-wrap {
      width: 36px; height: 36px; /* Proporsional */
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(circle at 32% 28%, var(--gold-400) 40%, var(--gold-500) 100%);
      color: var(--ink-950);
      font-weight: 700;
      flex-shrink: 0;
    }

    .icon-wrap svg { width: 16px; height: 16px; fill: currentColor; }

    .btn-text {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      text-align: left;
    }

    .btn-title { font-weight: 700; font-size: 13.5px; }
    .btn-desc { font-size: 10.5px; opacity: 0.6; }

    .chevron {
      margin-left: auto;
      opacity: 0.5;
      width: 14px;
      height: 14px;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    .menu-item:hover .chevron {
      transform: translateX(3px);
      opacity: 1;
      color: var(--gold-400);
    }

    /* === HOLDER TOMBOL UTAMA EVENT & TWIBBON === */
    .action-buttons-holder {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    /* === TOMBOL PREMIUM LIQUID SHINE (PAS & MENARIK) === */
    .premium-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 0.95rem 1.75rem; /* Ukuran proporsional sesuai instruksi */
      border: none;
      border-radius: 15px;
      font-family: 'Cairo', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      cursor: pointer;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Event UM (Glow Emas Premium) */
    .premium-btn.gold-luxury {
      background: linear-gradient(135deg, #a3720f 0%, #ffd97d 45%, #fff5d1 55%, #bd8612 100%);
      background-size: 200% auto;
      color: #261600;
      box-shadow: 0 8px 25px rgba(212, 154, 23, 0.3), inset 0 1px 2px rgba(255, 255, 255, 0.35);
      animation: liquidShine 5s ease infinite;
    }

    /* Twibbon Pekan Arabi (Glow Violet Rose Premium) */
    .premium-btn.violet-luxury {
      background: linear-gradient(135deg, #4c1d95 0%, #a855f7 45%, #f472b6 60%, #6d28d9 100%);
      background-size: 200% auto;
      color: #ffffff;
      box-shadow: 0 8px 25px rgba(168, 85, 247, 0.3), inset 0 1px 2px rgba(255, 255, 255, 0.25);
      animation: liquidShine 5s ease infinite reverse;
    }

    @keyframes liquidShine {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .premium-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -150%;
      width: 50%;
      height: 100%;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.6), transparent);
      transform: skewX(-30deg);
    }

    .premium-btn:hover::before {
      animation: lightFlash 1.4s infinite cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes lightFlash {
      0% { left: -150%; }
      50% { left: 150%; }
      100% { left: 150%; }
    }

    .premium-btn:hover {
      transform: translateY(-3px) scale(1.01);
    }
    .premium-btn.gold-luxury:hover {
      box-shadow: 0 12px 30px rgba(212, 154, 23, 0.45), 0 0 20px rgba(255, 240, 194, 0.5);
      color: #000000;
    }
    .premium-btn.violet-luxury:hover {
      box-shadow: 0 12px 30px rgba(168, 85, 247, 0.45), 0 0 20px rgba(244, 114, 182, 0.5);
    }

    .premium-btn svg { width: 18px; height: 20px; fill: currentColor; }

    /* === SOSIAL MEDIA GRIDS === */
    .social-grid {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-top: 2rem;
    }

    .social-btn {
      width: 40px; height: 44px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--glass-border);
      color: var(--paper);
      transition: all 0.3s ease;
    }

    .social-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: var(--gold-400);
      transform: translateY(-2px);
    }

    .social-btn svg { width: 18px; height: 20px; stroke: currentColor; }

    /* === FOOTER === */
    footer {
      margin-top: 2.25rem;
      font-size: 0.85rem;
      opacity: 0.75;
    }

    .arabic {
      font-family: 'Amiri', serif;
      color: var(--gold-400);
      font-size: 0.95rem;
      margin-top: 0.3rem;
    }
  </style>
</head>
<body>

  <script>
    // FUNGSI ANIMASI TRANSISI KETIKA TOMBOL "TAP HERE" DIKLIK
    function enterWebsite() {
      document.body.classList.add('content-active');
      setTimeout(startTyping, 600);
      unlockBackgroundMusic();
    }

    // ===== MUSIK LATAR BELAKANG (MP3 lokal tertanam, otomatis) =====
    // Sebagian besar browser memblokir autoplay bersuara sebelum ada interaksi
    // pengguna, jadi audio baru diputar begitu tombol "CLICK HERE" ditekan.
    var musicUnlocked = false;

    function unlockBackgroundMusic() {
      if (musicUnlocked) return;
      musicUnlocked = true;
      var audio = document.getElementById('bg-audio');
      if (!audio) return;
      audio.volume = 0.6;
      var playPromise = audio.play();
      if (playPromise && playPromise.catch) {
        playPromise.catch(function(err){ console.warn('Autoplay musik diblokir:', err); });
      }
    }

    // Musik tetap berjalan (dan otomatis dinyalakan jika belum) saat tombol
    // "Formulir & Jenis Lomba" (pendaftaran) ditekan. Link ini dibuka di tab
    // baru (target="_blank") supaya tab halaman utama tidak ikut berpindah,
    // sehingga musik latar tidak berhenti.
    var daftarLink = document.querySelector('a[href="lomba (2).html"]');
    if (daftarLink) {
      daftarLink.addEventListener('click', function() {
        musicUnlocked = true;
        var audio = document.getElementById('bg-audio');
        if (audio) {
          audio.volume = 0.6;
          var p = audio.play();
          if (p && p.catch) {
            p.catch(function(err){ console.warn('Autoplay musik diblokir:', err); });
          }
        }
      });
    }

    // Musik berhenti saat pengguna pindah/keluar dari tab ini,
    // dan otomatis lanjut lagi ketika kembali ke tab/halaman ini
    document.addEventListener('visibilitychange', function() {
      var audio = document.getElementById('bg-audio');
      if (!audio) return;
      if (document.hidden) {
        audio.pause();
      } else if (musicUnlocked) {
        var p = audio.play();
        if (p && p.catch) {
          p.catch(function(err){ console.warn('Autoplay musik diblokir:', err); });
        }
      }
    });

    // 1. GENERATOR PARTIKEL BINTANG SEAMLESS
    (function(){
      const wrap = document.getElementById('sparkles');
      const colors = ['#fff6d8', '#ffd479', '#ffe0ec', '#aa80ff'];
      const count = 35;
      
      for(let i = 0; i < count; i++){
        const s = document.createElement('div');
        s.className = 'spark';
        const size = Math.random() * 4 + 2; 
        
        s.style.width = size + 'px';
        s.style.height = size + 'px';
        s.style.left = Math.random() * 100 + 'vw';
        s.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        
        s.style.animationDuration = (Math.random() * 8 + 12) + 's';
        s.style.animationDelay = (Math.random() * -20) + 's';
        
        wrap.appendChild(s);
      }
    })();

    // 2. SMOOTH MARQUEE TYPING EFFECT
    const textArray = ["Selamat Datang di Pekan Arabi 2026", "رِحْلَةٌ فِي عَالَمِ عَجَائِبِ اللُّغَةِ الْعَرَبِيَّةِ", "Kalo Mau Sawit, Please Call Mee"];
    let textIndex = 0;
    let charIndex = 0;
    const outputElement = document.getElementById("typed-output");

    function startTyping() {
      if(!outputElement.textContent && charIndex === 0) {
        type();
      }
    }

    function type() {
      if (charIndex < textArray[textIndex].length) {
        outputElement.textContent += textArray[textIndex].charAt(charIndex);
        charIndex++;
        setTimeout(type, 75);
      } else {
        setTimeout(erase, 2200);
      }
    }

    function erase() {
      if (charIndex > 0) {
        outputElement.textContent = textArray[textIndex].substring(0, charIndex - 1);
        charIndex--;
        setTimeout(erase, 35);
      } else {
        textIndex = (textIndex + 1) % textArray.length;
        setTimeout(type, 400);
      }
    }
  </script>

  <script>
    // FUNGSI PEMBANGKIT LATAR BERGERAK: BINTANG, KILAU EMAS (WISP), DEBU EMAS, & PARALAX BULAN
    (function(){
      var starsLayer = document.getElementById('starsLayer');
      var wispLayer  = document.getElementById('wispLayer');
      var dustLayer  = document.getElementById('dustLayer');
      var parallax   = document.getElementById('parallax');

      function el(cls){ var d = document.createElement('div'); d.className = cls; return d; }
      function rand(a,b){ return a + Math.random()*(b-a); }

      // Bintang: dihindarkan dari area judul (43%-52% y) dan area lampu pojok kanan bawah
      var zones = [
        {xMin:0,  xMax:100, yMin:2,  yMax:32, weight:3},
        {xMin:0,  xMax:13,  yMin:33, yMax:60, weight:1},
        {xMin:87, xMax:100, yMin:14, yMax:40, weight:1}
      ];
      var weighted = [];
      zones.forEach(function(z){ for(var i=0;i<z.weight;i++) weighted.push(z); });

      var colors = ['', '', 'cyan', 'gold'];
      for(var i=0;i<22;i++){
        var z = weighted[Math.floor(Math.random()*weighted.length)];
        var s = el('star ' + colors[Math.floor(Math.random()*colors.length)]);
        var size = rand(2,4.2);
        s.style.width = size+'px';
        s.style.height = size+'px';
        s.style.left = rand(z.xMin,z.xMax)+'%';
        s.style.top = rand(z.yMin,z.yMax)+'%';
        s.style.animationDuration = rand(2.2,4.8)+'s';
        s.style.animationDelay = rand(0,5)+'s';
        starsLayer.appendChild(s);
      }

      // Kilau emas (wisp) mengikuti pita cahaya pada poster, memberi kesan hidup & bergerak lembut
      var wispSpots = [
        {x:8,  y:9},
        {x:14, y:39},
        {x:33, y:60},
        {x:47, y:67}
      ];
      wispSpots.forEach(function(p,i){
        var w = el('wisp');
        w.style.left = p.x+'%';
        w.style.top = p.y+'%';
        w.style.setProperty('--dx', rand(-10,14)+'px');
        w.style.setProperty('--dy', rand(-22,-10)+'px');
        w.style.animationDuration = rand(9,14)+'s';
        w.style.animationDelay = (i*1.3)+'s';
        wispLayer.appendChild(w);
      });

      // Debu emas naik perlahan, jarang & lambat agar tidak mengganggu teks
      for(var j=0;j<14;j++){
        var d = el('dust');
        var size = rand(2,4);
        d.style.width = size+'px';
        d.style.height = size+'px';
        d.style.left = rand(2,98)+'%';
        d.style.setProperty('--drift', rand(-40,40)+'px');
        d.style.animationDuration = rand(11,19)+'s';
        d.style.animationDelay = rand(0,16)+'s';
        dustLayer.appendChild(d);
      }

      // Gerakan parallax lembut mengikuti kursor, hanya pada langit (bulan, bintang, kilau)
      var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if(!reduce){
        window.addEventListener('mousemove', function(e){
          var rx = (e.clientX/window.innerWidth - .5);
          var ry = (e.clientY/window.innerHeight - .5);
          parallax.style.transform = 'translate(' + (rx*14) + 'px,' + (ry*10) + 'px)';
        });
      }
    })();
  </script>
